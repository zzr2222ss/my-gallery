<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悬浮环绕画廊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(145deg, #0b0f1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Inter', sans-serif;
      overflow: hidden;
    }
    
    .stage {
      position: relative;
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16/9;
      min-height: 500px;
    }
    
    .orbit-image {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 25px rgba(100,180,255,0.4);
      cursor: pointer;
      transition: box-shadow 0.3s;
      /* 初始居中定位 */
      transform: translate(-50%, -50%);
    }
    
    .orbit-image:hover {
      box-shadow: 0 25px 45px rgba(0,160,255,0.7), 0 0 40px #3b82f6;
      z-index: 20 !important;
      filter: brightness(1.1);
    }
    
    .video-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(280px, 40%, 420px);
      aspect-ratio: 16/9;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 60px rgba(70,130,255,0.5);
      z-index: 10;
      background: #000;
    }
    
    .video-center iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 700px) {
      .orbit-image { width: 65px; height: 65px; }
      .video-center { width: 55%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="orbitContainer" style="position: absolute; top: 50%; left: 50%; width: 0; height: 0;"></div>
    <div class="video-center">
      <iframe 
        src="https://player.bilibili.com/player.html?bvid=BV1CULM6IENG&autoplay=1&muted=1&loop=1"
        scrolling="no" 
        border="0" 
        frameborder="no" 
        framespacing="0" 
        allowfullscreen="true"
        allow="autoplay">
      </iframe>
    </div>
  </div>

  <script>
    const images = [
      "img1.jpeg",
      "img2.jpeg",
      "img3.jpeg",
      "img4.jpeg",
      "img5.jpeg",
      "img6.jpeg",
      "img7.jpeg",
      "img8.jpeg"
    ];

    const container = document.getElementById('orbitContainer');
    const total = images.length;
    const imageElements = [];
    
    // 轨道椭圆参数
    const radiusX = 260;
    const radiusY = 160;
    
    // 创建图片元素
    images.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'orbit-image';
      container.appendChild(img);
      
      imageElements.push({
        element: img,
        // 初始角度：均匀分布，从顶部开始
        angle: (i / total) * Math.PI * 2 - Math.PI/2,
        // 不同的浮动相位
        floatPhase: i * 0.7
      });
    });
    
    // 公转角度
    let orbitAngle = 0;
    const orbitSpeed = 0.005; // 旋转速度
    
    function animate() {
      orbitAngle += orbitSpeed;
      
      imageElements.forEach((item) => {
        const currentAngle = item.angle + orbitAngle;
        
        // 椭圆位置
        const x = Math.cos(currentAngle) * radiusX;
        const y = Math.sin(currentAngle) * radiusY;
        
        // 上下浮动效果
        const floatTime = Date.now() / 1000 + item.floatPhase;
        const floatY = Math.sin(floatTime * 1.5) * 12;
        const floatScale = 1 + Math.sin(floatTime * 1.5) * 0.04;
        
        // 设置位置 + 浮动，始终保持正向（不旋转）
        item.element.style.left = `${x}px`;
        item.element.style.top = `${y}px`;
        item.element.style.transform = `translate(-50%, -50%) translateY(${floatY}px) scale(${floatScale})`;
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>

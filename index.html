<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>233</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(145deg, #0b0f1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Inter', sans-serif;
      overflow: hidden;
    }
    
    .stage {
      position: relative;
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16/9;
      min-height: 500px;
    }
    
    .orbit-image {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 25px rgba(100,180,255,0.4);
      cursor: pointer;
      transition: box-shadow 0.3s;
      transform: translate(-50%, -50%);
    }
    
    .orbit-image:hover {
      box-shadow: 0 25px 45px rgba(0,160,255,0.7), 0 0 40px #3b82f6;
      z-index: 20 !important;
      filter: brightness(1.1);
    }
    
    .video-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(280px, 40%, 420px);
      aspect-ratio: 16/9;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 60px rgba(70,130,255,0.5);
      z-index: 10;
      background: #000;
    }
    
    .video-center video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 700px) {
      .orbit-image { width: 65px; height: 65px; }
      .video-center { width: 55%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="orbitContainer" style="position: absolute; top: 50%; left: 50%; width: 0; height: 0;"></div>
    <div class="video-center">
      <video src="others/video.mp4" muted loop autoplay playsinline controls style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>
  </div>

  <script>
    const images = [
      "others/img1.jpeg",
      "others/img2.jpeg",
      "others/img3.jpeg",
      "others/img4.jpeg",
      "others/img5.jpeg",
      "others/img6.jpeg",
      "others/img7.jpeg",
      "others/img8.jpeg"
    ];

    const container = document.getElementById('orbitContainer');
    const total = images.length;
    const imageElements = [];
    
    const radiusX = 260;
    const radiusY = 160;
    
    images.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'orbit-image';
      container.appendChild(img);
      
      imageElements.push({
        element: img,
        angle: (i / total) * Math.PI * 2 - Math.PI/2,
        floatPhase: i * 0.7
      });
    });
    
    let orbitAngle = 0;
    const orbitSpeed = 0.005;
    
    function animate() {
      orbitAngle += orbitSpeed;
      
      imageElements.forEach((item) => {
        const currentAngle = item.angle + orbitAngle;
        const x = Math.cos(currentAngle) * radiusX;
        const y = Math.sin(currentAngle) * radiusY;
        const floatTime = Date.now() / 1000 + item.floatPhase;
        const floatY = Math.sin(floatTime * 1.5) * 12;
        const floatScale = 1 + Math.sin(floatTime * 1.5) * 0.04;
        
        item.element.style.left = `${x}px`;
        item.element.style.top = `${y}px`;
        item.element.style.transform = `translate(-50%, -50%) translateY(${floatY}px) scale(${floatScale})`;
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
